<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moody | Health & Wellbeing</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #6366f1;
            --secondary: #2dd4bf;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #f43f5e;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(45, 212, 191, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            max-width: 600px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        header {
            text-align: center;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .date-display {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: transform 0.3s ease;
        }

        /* Quote Section */
        #quote-container {
            font-style: italic;
            text-align: center;
            min-height: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .quote-text {
            font-size: 1.1rem;
            color: var(--text-main);
            line-height: 1.4;
        }

        .quote-author {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 8px;
        }

        /* Tracker Section */
        .tracker-title {
            margin-bottom: 16px;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .mood-selector {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 20px;
        }

        .mood-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            font-size: 1.8rem;
            transition: all 0.2s ease;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .mood-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
        }

        .mood-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.5);
        }

        textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 15px;
            color: var(--text-main);
            resize: none;
            height: 100px;
            margin-bottom: 16px;
            outline: none;
        }

        textarea:focus {
            border-color: var(--primary);
        }

        .save-btn {
            width: 100%;
            background: linear-gradient(to right, var(--primary), #4f46e5);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .save-btn:hover {
            opacity: 0.9;
        }

        /* Analytics Section */
        .chart-container {
            height: 150px;
            display: flex;
            align-items: flex-end;
            gap: 8px;
            margin-top: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--glass-border);
        }

        .bar-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            height: 100%;
            justify-content: flex-end;
        }

        .bar {
            width: 100%;
            background: var(--secondary);
            border-radius: 4px 4px 0 0;
            min-height: 5px;
            transition: height 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .bar-label {
            font-size: 0.6rem;
            color: var(--text-dim);
            white-space: nowrap;
        }

        /* Burnout Section */
        #burnout-alert {
            display: none;
            background: rgba(244, 63, 94, 0.1);
            border: 1px solid var(--danger);
        }

        .burnout-title {
            color: var(--danger);
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* History */
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            padding: 12px;
            font-size: 0.9rem;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .history-date {
            color: var(--text-dim);
            font-weight: 600;
        }

        .history-mood {
            font-size: 1.1rem;
        }

        .history-note {
            color: var(--text-main);
            opacity: 0.8;
            line-height: 1.4;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 10px;
        }

        @media (max-width: 480px) {
            h1 { font-size: 2rem; }
            .mood-btn { font-size: 1.4rem; padding: 10px; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>Moody</h1>
            <div id="current-date" class="date-display"></div>
        </header>

        <section id="quote-card" class="glass-card">
            <div id="quote-container">
                <div class="quote-text">"Loading inspiration..."</div>
                <div class="quote-author"></div>
            </div>
        </section>

        <section id="burnout-alert" class="glass-card">
            <div class="burnout-title">⚠️ Self-Care Check-in</div>
            <p id="burnout-message" class="history-note"></p>
        </section>

        <section class="glass-card">
            <h2 class="tracker-title">How are you feeling?</h2>
            <div class="mood-selector" id="mood-selector">
                <button class="mood-btn" data-mood="1" title="Very Low">😢</button>
                <button class="mood-btn" data-mood="2" title="Low">☹️</button>
                <button class="mood-btn" data-mood="3" title="Neutral">😐</button>
                <button class="mood-btn" data-mood="4" title="Good">🙂</button>
                <button class="mood-btn" data-mood="5" title="Excellent">😄</button>
            </div>
            <textarea id="journal-input" placeholder="Write a short thought about your day..."></textarea>
            <button id="save-btn" class="save-btn">Log Today's Mood</button>
        </section>

        <section class="glass-card">
            <h2 class="tracker-title">Analytics Dashboard</h2>
            <div id="chart" class="chart-container">
                <!-- Bars will be injected here -->
            </div>
        </section>

        <section class="glass-card">
            <h2 class="tracker-title">History</h2>
            <div id="history-list" class="history-list">
                <!-- History items will be injected here -->
            </div>
        </section>
    </div>

    <script>
        const API_URL = '/api/entries';
        const QUOTE_URL = '/api/quote';
        let entries = [];
        let selectedMood = null;

        const fallbackQuotes = [
            { text: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
            { text: "Believe you can and you're halfway there.", author: "Theodore Roosevelt" },
            { text: "It does not matter how slowly you go as long as you do not stop.", author: "Confucius" },
            { text: "Self-care is not self-indulgence, it is self-preservation.", author: "Audre Lorde" },
            { text: "Your mental health is a priority. Your happiness is an essential.", author: "Unknown" }
        ];

        // Initialize UI
        document.addEventListener('DOMContentLoaded', () => {
            updateDate();
            fetchQuote();
            loadEntries();
        });

        // Date Display
        function updateDate() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('current-date').textContent = now.toLocaleDateString(undefined, options);
        }

        // Quote Fetching via Backend Proxy
        async function fetchQuote() {
            const container = document.getElementById('quote-container');
            try {
                const response = await fetch(QUOTE_URL);
                if (!response.ok) throw new Error();
                const data = await response.json();
                const quoteData = data[0];
                container.innerHTML = `
                    <div class="quote-text">"${quoteData.q}"</div>
                    <div class="quote-author">— ${quoteData.a}</div>
                `;
            } catch (error) {
                const random = fallbackQuotes[Math.floor(Math.random() * fallbackQuotes.length)];
                container.innerHTML = `
                    <div class="quote-text">"${random.text}"</div>
                    <div class="quote-author">— ${random.author}</div>
                `;
            }
        }

        // Load Entries from Backend
        async function loadEntries() {
            try {
                const response = await fetch(API_URL);
                entries = await response.json();
                renderHistory();
                renderChart();
                checkBurnout();
            } catch (error) {
                console.error('Failed to load entries', error);
            }
        }

        // Mood Selection
        const moodBtns = document.querySelectorAll('.mood-btn');
        moodBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                moodBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedMood = parseInt(btn.dataset.mood);
            });
        });

        // Save Entry to Backend
        document.getElementById('save-btn').addEventListener('click', async () => {
            const journal = document.getElementById('journal-input').value.trim();
            
            if (!selectedMood) {
                alert('Please select a mood!');
                return;
            }

            const today = new Date().toISOString().split('T')[0];
            const newEntry = {
                date: today,
                mood: selectedMood,
                journal: journal
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newEntry)
                });

                if (response.ok) {
                    // Reset form
                    document.getElementById('journal-input').value = '';
                    moodBtns.forEach(b => b.classList.remove('active'));
                    selectedMood = null;
                    
                    // Reload data
                    loadEntries();
                } else {
                    throw new Error('Save failed');
                }
            } catch (error) {
                alert('Error saving mood entry. Please try again.');
            }
        });

        // Render History
        function renderHistory() {
            const list = document.getElementById('history-list');
            if (entries.length === 0) {
                list.innerHTML = '<p class="quote-author" style="text-align:center">No entries yet. Start tracking today!</p>';
                return;
            }

            const moodEmojis = { 1: '😢', 2: '☹️', 3: '😐', 4: '🙂', 5: '😄' };
            list.innerHTML = entries.slice(0, 10).map(entry => `
                <div class="history-item">
                    <div class="history-header">
                        <span class="history-date">${formatDate(entry.date)}</span>
                        <span class="history-mood">${moodEmojis[entry.mood]}</span>
                    </div>
                    ${entry.journal ? `<p class="history-note">${entry.journal}</p>` : ''}
                </div>
            `).join('');
        }

        // Render Chart
        function renderChart() {
            const chart = document.getElementById('chart');
            const data = [...entries].reverse().slice(-7); // Last 7 days

            if (data.length === 0) {
                chart.innerHTML = '<p class="quote-author" style="width:100%; text-align:center">Add data to see trends</p>';
                return;
            }

            chart.innerHTML = data.map(entry => {
                const height = (entry.mood / 5) * 100;
                const label = entry.date.split('-').slice(1).join('/'); // MM/DD
                return `
                    <div class="bar-wrapper">
                        <div class="bar" style="height: ${height}%; opacity: ${0.4 + (entry.mood/10)}"></div>
                        <span class="bar-label">${label}</span>
                    </div>
                `;
            }).join('');
        }

        // Burnout Detection
        function checkBurnout() {
            const alertBox = document.getElementById('burnout-alert');
            const message = document.getElementById('burnout-message');

            if (entries.length < 3) {
                alertBox.style.display = 'none';
                return;
            }

            const lastSeven = entries.slice(0, 7);
            const avg = lastSeven.reduce((sum, e) => sum + e.mood, 0) / lastSeven.length;

            if (avg < 2.8) {
                alertBox.style.display = 'block';
                message.textContent = "You've been logging lower moods recently. It's okay to feel this way, but remember to prioritize your rest. Consider a digital detox or reaching out to a friend today.";
            } else {
                alertBox.style.display = 'none';
            }
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
        }
    </script>
</body>
</html>
